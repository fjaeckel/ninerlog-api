services:
  postgres:
    image: postgres:18-alpine
    container_name: pilotlog-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pilotlog}
      POSTGRES_USER: ${POSTGRES_USER:-pilotlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pilotlog}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pilotlog-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pilotlog-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-pilotlog}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-pilotlog}?sslmode=disable
      
      # Server
      PORT: ${API_PORT:-3000}
      GIN_MODE: ${GIN_MODE:-release}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-key}
      REFRESH_SECRET: ${REFRESH_SECRET:-change-this-refresh-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_EXPIRES_IN: ${REFRESH_EXPIRES_IN:-7d}
      
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:80}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${API_PORT:-3000}:3000"
    networks:
      - pilotlog-network
    volumes:
      - ./db/migrations:/app/db/migrations:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local

networks:
  pilotlog-network:
    driver: bridge
