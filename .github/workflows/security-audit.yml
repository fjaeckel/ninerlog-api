name: Security Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: gosec
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      GOSEC_VERSION: v2.27.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install gosec
        run: |
          set -euo pipefail
          version="${GOSEC_VERSION#v}"
          goos="$(go env GOOS)"
          goarch="$(go env GOARCH)"
          archive="gosec_${version}_${goos}_${goarch}.tar.gz"
          base_url="https://github.com/securego/gosec/releases/download/${GOSEC_VERSION}"

          curl -fsSLo "$RUNNER_TEMP/$archive" "$base_url/$archive"
          curl -fsSLo "$RUNNER_TEMP/gosec_checksums.txt" "$base_url/gosec_${version}_checksums.txt"

          (
            cd "$RUNNER_TEMP"
            grep " ${archive}$" gosec_checksums.txt | sha256sum -c -
          )

          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP" gosec
          chmod +x "$RUNNER_TEMP/gosec"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Run gosec
        run: |
          gosec --version
          gosec -severity high -exclude=G101,G104 ./...

  trivy:
    name: Trivy filesystem scan
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
