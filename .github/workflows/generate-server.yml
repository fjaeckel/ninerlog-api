name: Generate OpenAPI Server

on:
  repository_dispatch:
    types: [openapi-updated]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/generate-server-types.sh'
      - 'api-spec/openapi.yaml'

permissions:
  contents: write

jobs:
  generate-server:
    name: Generate Go Server Types
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout API repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
          cache: true

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

      - name: Generate Go server types
        run: |
          ./scripts/generate-server-types.sh api-spec/openapi.yaml

      - name: Format generated code
        run: |
          go fmt ./internal/api/generated/...
          
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code internal/api/generated/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Verify build
        if: steps.git-check.outputs.changes == 'true'
        run: |
          go mod tidy
          go build ./...

      - name: Run tests
        if: steps.git-check.outputs.changes == 'true'
        run: go test -short ./...

      - name: Commit and push if changed
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add internal/api/generated/
          git add go.mod go.sum
          git commit -m "chore(api): regenerate server types from OpenAPI spec [skip ci]"
          git push

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true' && github.event_name == 'repository_dispatch'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(api): regenerate server types from OpenAPI spec"
          title: "chore: Update API server types from OpenAPI spec"
          body: |
            ## OpenAPI Server Update
            
            This PR updates the generated Go server types to match the latest OpenAPI specification.
            
            **Triggered by**: OpenAPI spec change in ninerlog-api
            **Commit**: ${{ github.event.client_payload.sha }}
            
            ### Changes
            - Regenerated Go types and interfaces
            - Updated request/response models
            - Refreshed validation schemas
            
            ### Testing
            - [x] Build passes
            - [x] Unit tests pass
            - [ ] Integration tests pass
            - [ ] No breaking changes (or documented)
            
            **Auto-generated by GitHub Actions**
          branch: openapi-server-update
          delete-branch: true
