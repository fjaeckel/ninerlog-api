        - Examiner
      description: Role of a person on board a flight

    ApproachType:
      type: string
      enum:
        - ILS
        - LOC
        - VOR
        - RNAV/GPS
        - NDB
        - LDA
        - SDF
        - PAR
        - ASR
        - Visual
        - Circling
        - Other
        - Unknown
      description: Type of instrument approach procedure

    ApproachEntry:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/ApproachType'
        airport:
          type: [string, 'null']
          example: EDDF
          description: ICAO code of the airport where the approach was performed
        runway:
          type: [string, 'null']
          example: '09L'
          description: Runway designation for the approach

    ApproachEntryInput:
      type: object
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/ApproachType'
        airport:
          type: [string, 'null']
          description: ICAO code of the airport
