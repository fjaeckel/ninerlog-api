openapi: 3.1.0
info:
  title: NinerLog API
  version: 1.0.0
  description: |
    RESTful API for EASA/FAA compliant pilot logbook management.
    
    ## Features
    - Multi-license support (PPL, SPL, CPL, ATPL, IR)
    - EASA and FAA regulatory compliance
    - Flight logging with detailed time tracking
    - Currency calculations
    - Statistics and hour totals per license
    
    ## Authentication
    All endpoints except `/auth/register` and `/auth/login` require JWT authentication.
    Include the token in the Authorization header: `Bearer <token>`
    
  contact:
    name: Frederic Jaeckel
    email: frederic@ninerlog.app
  license:
    name: TBD

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
  - url: https://api.ninerlog.app/api/v1
    description: Production server

tags:
  - name: Authentication
    description: User registration and login
  - name: Users
    description: User profile management
  - name: Licenses
    description: Pilot license management
  - name: Aircraft
    description: Aircraft database management
  - name: Flights
    description: Flight log entries
  - name: Flight Sessions
    description: Live tap-to-log capture of block/flight times from mobile devices
  - name: Statistics
    description: Hour totals and analytics
  - name: Currency
    description: Currency status checks
  - name: Credentials
    description: Medicals, language proficiency, and security clearances
  - name: Maps
    description: Airport coordinates, flight routes, and activity heatmap
  - name: Import
    description: Flight log import from CSV and XLS/XLSX files (including ForeFlight export)
  - name: Reports
    description: Flight statistics, trends, and breakdowns
  - name: Contacts
    description: Reusable crew and contact management
  - name: Admin
    description: Admin-only platform management (requires ADMIN_EMAIL env var match)
  - name: Backups
    description: Cloud backup destinations and scheduled runs (S3 and S3-compatible storage)

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: |
        Create a new user account with email and password.

        When SMTP is configured, a verification email is sent to the provided address,
        and the user must confirm it before they can log in.

        When SMTP is not configured, the backend auto-verifies the new account so
        registration and login remain usable in local/self-hosted setups.

        No authentication tokens are returned from this endpoint.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                  example: pilot@example.com
                password:
                  type: string
                  format: password
                  minLength: 12
                  example: SecurePass123!
                  description: Must be at least 12 characters
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: John Doe
                preferredLocale:
                  type: string
                  enum: [en, de]
                  description: Preferred language for the interface. Defaults to `en` when omitted.
                  example: en
      responses:
        '201':
          description: User created (verification may be required depending on SMTP configuration)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/verify-email:
    post:
      tags:
        - Authentication
      summary: Verify email address
      description: |
        Consume an email-verification token (delivered via the registration email)
        and mark the user's address as verified. On success, returns a full
        `AuthResponse` so the frontend can log the user in immediately.
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: Verification token from the email link
      responses:
        '200':
          description: Email verified — user is now logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid, expired, or already-used token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/verify-email/resend:
    post:
      tags:
        - Authentication
      summary: Resend the email-verification message
      description: |
        Request a fresh verification email. Always returns 204 regardless of whether
        the email exists or is already verified, to prevent user enumeration.
      operationId: resendVerificationEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: pilot@example.com
      responses:
        '204':
          description: Verification email sent (if account exists and is not yet verified)
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login
      description: Authenticate with email and password to receive JWT tokens
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: pilot@example.com
                password:
                  type: string
                  format: password
                  example: SecurePass123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: |
            Account cannot be used. The error `code` distinguishes the reason:
            `email_not_verified` (email confirmation pending) or `account_disabled`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Use refresh token to obtain a new access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                    description: New refresh token (rotation — old token is invalidated)
                  expiresIn:
                    type: integer
                    description: Token expiry in seconds
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change password
      description: Change the authenticated user's password. Requires the current password for verification.
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                  description: The user's current password
                newPassword:
                  type: string
                  format: password
                  minLength: 12
                  description: The new password (minimum 12 characters)
      responses:
        '204':
          description: Password changed successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/password-reset-request:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: |
        Send a password reset email to the provided address. Always returns 204 regardless
        of whether the email exists, to prevent user enumeration.
      operationId: requestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: pilot@example.com
      responses:
        '204':
          description: Password reset email sent (if account exists)
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/password-reset:
    post:
      tags:
        - Authentication
      summary: Reset password with token
      description: Reset the user's password using a token received via email.
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                  description: Password reset token from email
                newPassword:
                  type: string
                  format: password
                  minLength: 12
                  description: The new password (minimum 12 characters)
      responses:
        '204':
          description: Password reset successfully
        '400':
          description: Invalid request, expired token, or already used token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/webauthn/register/options:
    post:
      tags:
        - Authentication
      summary: Begin passkey registration
      description: Returns WebAuthn `PublicKeyCredentialCreationOptions` plus an opaque session id used to verify the attestation.
      operationId: webauthnRegisterOptions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Registration options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebAuthnRegistrationOptions'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: WebAuthn is not configured on this server

  /auth/webauthn/register/verify:
    post:
      tags:
        - Authentication
      summary: Verify passkey registration attestation
      description: Verifies the authenticator attestation produced from the registration options and stores the credential.
      operationId: webauthnRegisterVerify
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - response
              properties:
                sessionId:
                  type: string
                  description: Session id returned from `/auth/webauthn/register/options`
                label:
                  type: string
                  description: Optional human-readable label for the passkey
                response:
                  type: object
                  description: Raw `PublicKeyCredential` returned from `navigator.credentials.create`
                  additionalProperties: true
      responses:
        '200':
          description: Newly registered passkey
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebAuthnCredential'
        '400':
          description: Invalid or expired registration response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: WebAuthn is not configured on this server

  /auth/webauthn/login/options:
    post:
      tags:
        - Authentication
      summary: Begin passkey login
      description: Returns WebAuthn `PublicKeyCredentialRequestOptions` for either a discoverable credential (no email) or a specific user.
      operationId: webauthnLoginOptions
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: Optional email to scope the challenge to a specific user
      responses:
        '200':
          description: Login options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebAuthnLoginOptions'
        '503':
          description: WebAuthn is not configured on this server

  /auth/webauthn/login/verify:
    post:
      tags:
        - Authentication
      summary: Verify passkey assertion and sign in
      description: Verifies the authenticator assertion and returns a token pair. Successful passkey logins bypass the 2FA challenge.
      operationId: webauthnLoginVerify
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - response
              properties:
                sessionId:
                  type: string
                response:
                  type: object
                  description: Raw `PublicKeyCredential` returned from `navigator.credentials.get`
                  additionalProperties: true
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid or expired login response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Passkey verification failed or unknown credential
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: WebAuthn is not configured on this server

  /auth/webauthn/credentials:
    get:
      tags:
        - Authentication
      summary: List the current user's passkeys
      operationId: listWebauthnCredentials
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Passkeys registered for the current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebAuthnCredential'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/webauthn/credentials/{credentialId}:
    delete:
      tags:
        - Authentication
      summary: Revoke a passkey
      operationId: deleteWebauthnCredential
      security:
        - bearerAuth: []
      parameters:
        - name: credentialId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Passkey revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Passkey not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/2fa/setup:
    post:
      tags:
        - Authentication
      summary: Start 2FA setup
      description: Generate a TOTP secret and return the provisioning URI for authenticator apps. Does not enable 2FA until verified.
      operationId: setup2FA
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 2FA setup data with secret and QR URI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorSetup'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: 2FA is already enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/2fa/verify:
    post:
      tags:
        - Authentication
      summary: Verify and enable 2FA
      description: Verify a TOTP code to confirm setup and enable 2FA. Returns backup recovery codes.
      operationId: verify2FA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  description: 6-digit TOTP code from authenticator app
      responses:
        '200':
          description: 2FA enabled with recovery codes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorEnabled'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/2fa/disable:
    post:
      tags:
        - Authentication
      summary: Disable 2FA
      description: Disable two-factor authentication. Requires current password for confirmation.
      operationId: disable2FA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  format: password
      responses:
        '204':
          description: 2FA disabled
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/2fa/login:
    post:
      tags:
        - Authentication
      summary: Complete login with 2FA code
      description: After initial login returns requiresTwoFactor, submit the TOTP code or recovery code here.
      operationId: login2FA
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - twoFactorToken
                - code
              properties:
                twoFactorToken:
                  type: string
                  description: Temporary token from login response
                code:
                  type: string
                  description: 6-digit TOTP code or recovery code
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me:
    get:
      tags:
        - Users
      summary: Get current user profile
      description: Retrieve the authenticated user's profile information
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags:
        - Users
      summary: Update current user profile
      description: Update the authenticated user's profile information
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                email:
                  type: string
                  format: email
                timeDisplayFormat:
                  type: string
                  enum: [hm, decimal]
                  description: Preferred time display format
                dateFormat:
                  type: string
                  enum: [DD.MM.YYYY, MM/DD/YYYY, YYYY-MM-DD]
                  description: Preferred date display format
                decimalSeparator:
                  type: string
                  enum: [comma, dot]
                  description: Preferred decimal separator for number display
                preferredLocale:
                  type: string
                  enum: [en, de]
                  description: Preferred language for the interface
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags:
        - Users
      summary: Delete current user account
      description: Permanently delete the authenticated user's account and all associated data (licenses, flights, tokens). This action cannot be undone.
      operationId: deleteCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  format: password
                  description: Current password for confirmation
      responses:
        '204':
          description: Account deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/notifications:
    get:
      tags:
        - Users
      summary: Get notification preferences
      description: Get the authenticated user's notification preferences
      operationId: getNotificationPreferences
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notification preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferences'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags:
        - Users
      summary: Update notification preferences
      description: Update the authenticated user's notification preferences
      operationId: updateNotificationPreferences
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferencesUpdate'
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferences'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/notifications/history:
    get:
      tags:
        - Users
      summary: Get notification history
      description: Get the authenticated user's notification history (sent notifications)
      operationId: getNotificationHistory
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Maximum number of results to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of results to skip
      responses:
        '200':
          description: Notification history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationHistoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/baseline:
    get:
      tags:
        - Users
      summary: Get the user's initial hours snapshot (baseline)
      description: |
        Returns the user's optional initial-hours snapshot. The snapshot represents
        flying experience accumulated up to a chosen cutoff date and is added to
        aggregated user-level statistics (`/users/me/statistics`) when the
        requested date range covers the cutoff. Returns 404 when no snapshot exists.
      operationId: getMyBaseline
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User's flight baseline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightBaseline'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Users
      summary: Create or replace the user's initial hours snapshot
      description: |
        Upserts the authenticated user's initial-hours snapshot. All numeric fields
        default to zero when omitted. The cutoff date marks the latest moment that
        the baseline counts toward; logged flights on or after this date are added
        on top of the baseline.
      operationId: putMyBaseline
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlightBaselineInput'
      responses:
        '200':
          description: Baseline created or updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightBaseline'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags:
        - Users
      summary: Remove the user's initial hours snapshot
      operationId: deleteMyBaseline
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Baseline removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/me/statistics:
    get:
      tags:
        - Statistics
      summary: Get current user's flight statistics
      description: Get aggregated flight statistics for the authenticated user across all flights, independent of any license.
      operationId: getMyStatistics
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          description: Filter from this date (inclusive)
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Filter to this date (inclusive)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: User flight statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Statistics'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /licenses:
    get:
      tags:
        - Licenses
      summary: List user's licenses
      description: Get all licenses for the authenticated user
      operationId: listLicenses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of licenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/License'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Licenses
      summary: Create a new license
      description: Add a new pilot license for the authenticated user
      operationId: createLicense
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LicenseCreate'
      responses:
        '201':
          description: License created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/License'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /licenses/{licenseId}:
    get:
      tags:
        - Licenses
      summary: Get license details
      description: Retrieve details of a specific license
      operationId: getLicense
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LicenseId'
      responses:
        '200':
          description: License details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/License'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Licenses
