          minimum: 0
        dualGivenTime:
          type: integer
          minimum: 0
        simulatedFlightTime:
          type: integer
          minimum: 0
        groundTrainingTime:
          type: integer
          minimum: 0
        actualInstrumentTime:
          type: integer
          minimum: 0
        simulatedInstrumentTime:
          type: integer
          minimum: 0
        holds:
