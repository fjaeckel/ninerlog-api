      responses:
        '200':
          description: JSON backup file download
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /imports/json:
    post:
      tags: [Import]
      summary: Restore a NinerLog JSON backup
      description: |
        Restore a previously exported NinerLog JSON backup into the authenticated
        user's account. Recreates aircraft, licenses, class ratings, credentials,
        flights and crew members from the backup. New UUIDs are assigned so the
        backup can be restored into any NinerLog installation (including the one
        it was exported from).

        This is an additive operation — it does not modify or delete existing
        data. Aircraft whose registration already exists for the user are
        skipped (and the existing aircraft is referenced by imported flights).
      operationId: importDataJSON
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: A NinerLog JSON backup as produced by `GET /exports/json`
              required: [format]
              properties:
                format:
                  type: string
                  example: NinerLog JSON Backup
                version:
                  type: string
                exportedAt:
                  type: string
                  format: date-time
                flights:
                  type: array
                  items:
                    type: object
                aircraft:
                  type: array
                  items:
                    type: object
                licenses:
                  type: array
                  items:
                    type: object
                credentials:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Restore summary with per-entity counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJSONResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /exports/pdf:
    get:
      tags: [Export]
      summary: Export flights as PDF logbook
      description: Export all flight data as a formatted PDF document. Supports EASA AMC1 FCL.050, FAA (ASA/Jeppesen), and summary formats.
      operationId: exportFlightsPDF
      security:
        - bearerAuth: []
      parameters:
        - name: logbookLicenseId
          in: query
          description: Filter flights for a specific logbook license
          schema:
            type: string
            format: uuid
        - name: format
          in: query
          description: PDF format — easa (AMC1 FCL.050 two-page spread), faa (ASA/Jeppesen layout), or summary (simplified totals)
          schema:
            type: string
            enum: [easa, faa, summary]
            default: easa
        - name: page_size
          in: query
          description: Page size for the generated PDF. All sizes are rendered in landscape orientation. EASA format is laid out as a book-style two-page spread (left + right) intended for double-sided printing.
          schema:
            type: string
            enum: [a4, a5, letter]
            default: a4
      responses:
        '200':
          description: PDF file download
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'

