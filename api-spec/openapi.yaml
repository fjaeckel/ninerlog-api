openapi: 3.1.0
info:
  title: NinerLog API
  version: 1.0.0
  description: |
    RESTful API for EASA/FAA compliant pilot logbook management.
    
    ## Features
    - Multi-license support (PPL, SPL, CPL, ATPL, IR)
    - EASA and FAA regulatory compliance
    - Flight logging with detailed time tracking
    - Currency calculations
    - Statistics and hour totals per license
    
    ## Authentication
    All endpoints except `/auth/register` and `/auth/login` require JWT authentication.
    Include the token in the Authorization header: `Bearer <token>`
    
  contact:
    name: Frederic Jaeckel
    email: frederic@ninerlog.app
  license:
    name: TBD

servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
  - url: https://api.ninerlog.app/api/v1
    description: Production server

tags:
  - name: Authentication
    description: User registration and login
  - name: Users
    description: User profile management
  - name: Licenses
    description: Pilot license management
  - name: Aircraft
    description: Aircraft database management
  - name: Flights
    description: Flight log entries
  - name: Statistics
    description: Hour totals and analytics
  - name: Currency
    description: Currency status checks
  - name: Credentials
    description: Medicals, language proficiency, and security clearances
  - name: Maps
    description: Airport coordinates, flight routes, and activity heatmap
  - name: Import
    description: Flight log import from CSV and XLS/XLSX files (including ForeFlight export)
  - name: Reports
    description: Flight statistics, trends, and breakdowns
  - name: Contacts
    description: Reusable crew and contact management
  - name: Admin
    description: Admin-only platform management (requires ADMIN_EMAIL env var match)

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Create a new user account with email and password
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                  example: pilot@example.com
                password:
                  type: string
                  format: password
                  minLength: 12
                  example: SecurePass123!
                  description: Must be at least 12 characters
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: John Doe
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login
      description: Authenticate with email and password to receive JWT tokens
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: pilot@example.com
                password:
                  type: string
                  format: password
                  example: SecurePass123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Use refresh token to obtain a new access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                    description: New refresh token (rotation — old token is invalidated)
                  expiresIn:
                    type: integer
                    description: Token expiry in seconds
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change password
      description: Change the authenticated user's password. Requires the current password for verification.
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                  description: The user's current password
                newPassword:
                  type: string
                  format: password
                  minLength: 12
                  description: The new password (minimum 12 characters)
      responses:
        '204':
          description: Password changed successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/password-reset-request:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: |
        Send a password reset email to the provided address. Always returns 204 regardless
        of whether the email exists, to prevent user enumeration.
      operationId: requestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: pilot@example.com
      responses:
        '204':
          description: Password reset email sent (if account exists)
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/password-reset:
    post:
      tags:
        - Authentication
      summary: Reset password with token
      description: Reset the user's password using a token received via email.
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                  description: Password reset token from email
                newPassword:
                  type: string
                  format: password
                  minLength: 12
                  description: The new password (minimum 12 characters)
      responses:
        '204':
          description: Password reset successfully
        '400':
          description: Invalid request, expired token, or already used token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/2fa/setup:
    post:
      tags:
        - Authentication
      summary: Start 2FA setup
      description: Generate a TOTP secret and return the provisioning URI for authenticator apps. Does not enable 2FA until verified.
      operationId: setup2FA
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 2FA setup data with secret and QR URI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorSetup'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: 2FA is already enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/2fa/verify:
    post:
      tags:
        - Authentication
      summary: Verify and enable 2FA
      description: Verify a TOTP code to confirm setup and enable 2FA. Returns backup recovery codes.
      operationId: verify2FA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 6
                  description: 6-digit TOTP code from authenticator app
      responses:
        '200':
          description: 2FA enabled with recovery codes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorEnabled'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/2fa/disable:
    post:
      tags:
        - Authentication
      summary: Disable 2FA
      description: Disable two-factor authentication. Requires current password for confirmation.
      operationId: disable2FA
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  format: password
      responses:
        '204':
          description: 2FA disabled
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/2fa/login:
    post:
      tags:
        - Authentication
      summary: Complete login with 2FA code
      description: After initial login returns requiresTwoFactor, submit the TOTP code or recovery code here.
      operationId: login2FA
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - twoFactorToken
                - code
              properties:
                twoFactorToken:
                  type: string
                  description: Temporary token from login response
                code:
                  type: string
                  description: 6-digit TOTP code or recovery code
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me:
    get:
      tags:
        - Users
      summary: Get current user profile
      description: Retrieve the authenticated user's profile information
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags:
        - Users
      summary: Update current user profile
      description: Update the authenticated user's profile information
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                email:
                  type: string
                  format: email
                timeDisplayFormat:
                  type: string
                  enum: [hm, decimal]
                  description: Preferred time display format
                dateFormat:
                  type: string
                  enum: [DD.MM.YYYY, MM/DD/YYYY, YYYY-MM-DD]
                  description: Preferred date display format
                decimalSeparator:
                  type: string
                  enum: [comma, dot]
                  description: Preferred decimal separator for number display
                preferredLocale:
                  type: string
                  enum: [en, de]
                  description: Preferred language for the interface
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags:
        - Users
      summary: Delete current user account
      description: Permanently delete the authenticated user's account and all associated data (licenses, flights, tokens). This action cannot be undone.
      operationId: deleteCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  format: password
                  description: Current password for confirmation
      responses:
        '204':
          description: Account deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/notifications:
    get:
      tags:
        - Users
      summary: Get notification preferences
      description: Get the authenticated user's notification preferences
      operationId: getNotificationPreferences
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Notification preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferences'
        '401':
          $ref: '#/components/responses/Unauthorized'

    patch:
      tags:
        - Users
      summary: Update notification preferences
      description: Update the authenticated user's notification preferences
      operationId: updateNotificationPreferences
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferencesUpdate'
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferences'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/notifications/history:
    get:
      tags:
        - Users
      summary: Get notification history
      description: Get the authenticated user's notification history (sent notifications)
      operationId: getNotificationHistory
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Maximum number of results to return
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of results to skip
      responses:
        '200':
          description: Notification history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationHistoryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/statistics:
    get:
      tags:
        - Statistics
      summary: Get current user's flight statistics
      description: Get aggregated flight statistics for the authenticated user across all flights, independent of any license.
      operationId: getMyStatistics
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          description: Filter from this date (inclusive)
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Filter to this date (inclusive)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: User flight statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Statistics'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /licenses:
    get:
      tags:
        - Licenses
      summary: List user's licenses
      description: Get all licenses for the authenticated user
      operationId: listLicenses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of licenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/License'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Licenses
      summary: Create a new license
      description: Add a new pilot license for the authenticated user
      operationId: createLicense
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LicenseCreate'
      responses:
        '201':
          description: License created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/License'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /licenses/{licenseId}:
    get:
      tags:
        - Licenses
      summary: Get license details
      description: Retrieve details of a specific license
      operationId: getLicense
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LicenseId'
      responses:
        '200':
          description: License details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/License'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Licenses
      summary: Update license
      description: Update license information
      operationId: updateLicense
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LicenseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                regulatoryAuthority:
                  type: string
                licenseType:
                  type: string
                licenseNumber:
                  type: string
                issuingAuthority:
                  type: string
                requiresSeparateLogbook:
                  type: boolean
      responses:
        '200':
          description: License updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/License'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Licenses
      summary: Delete license
      description: Delete a license and all associated flight logs
      operationId: deleteLicense
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LicenseId'
      responses:
        '204':
          description: License deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /licenses/{licenseId}/statistics:
    get:
      tags:
        - Statistics
      summary: Get license statistics
      description: Get hour totals and flight counts filtered by aircraft class of the license's ratings
      operationId: getLicenseStatistics
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LicenseId'
        - name: startDate
          in: query
          description: Filter from this date (inclusive)
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Filter to this date (inclusive)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: License statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Statistics'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /licenses/{licenseId}/currency:
    get:
      tags:
        - Currency
      summary: Check currency status
      description: Check if pilot is current according to EASA/FAA regulations
      operationId: getLicenseCurrency
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LicenseId'
      responses:
        '200':
          description: Currency status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Currency'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /currency:
    get:
      tags: [Currency]
      summary: Get currency status for all class ratings
      description: Returns currency status per class rating across all licenses. Each class rating's currency is evaluated based on the regulatory authority of its parent license.
      operationId: getAllCurrencyStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Currency status per class rating
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrencyStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /licenses/{licenseId}/ratings:
    get:
      tags: [Licenses]
      summary: List class ratings for a license
      operationId: listClassRatings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LicenseId'
      responses:
        '200':
          description: List of class ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClassRating'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Licenses]
      summary: Add class rating to license
      operationId: createClassRating
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LicenseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassRatingCreate'
      responses:
        '201':
          description: Class rating created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassRating'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /licenses/{licenseId}/ratings/{ratingId}:
    patch:
      tags: [Licenses]
      summary: Update class rating
      operationId: updateClassRating
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LicenseId'
        - name: ratingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassRatingUpdate'
      responses:
        '200':
          description: Class rating updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassRating'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Licenses]
      summary: Delete class rating
      operationId: deleteClassRating
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LicenseId'
        - name: ratingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Class rating deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /credentials:
    get:
      tags:
        - Credentials
      summary: List credentials
      description: Get all credentials for the authenticated user
      operationId: listCredentials
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of credentials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Credential'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Credentials
      summary: Add credential
      description: Add a new credential (medical, language proficiency, or security clearance)
      operationId: createCredential
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialCreate'
      responses:
        '201':
          description: Credential created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Credential'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /credentials/{credentialId}:
    get:
      tags:
        - Credentials
      summary: Get credential details
      operationId: getCredential
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CredentialId'
      responses:
        '200':
          description: Credential details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Credential'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Credentials
      summary: Update credential
      operationId: updateCredential
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CredentialId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialUpdate'
      responses:
        '200':
          description: Credential updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Credential'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Credentials
      summary: Delete credential
      operationId: deleteCredential
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/CredentialId'
      responses:
        '204':
          description: Credential deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /aircraft:
    get:
      tags:
        - Aircraft
      summary: List aircraft
      description: Get all aircraft registered by the authenticated user
      operationId: listAircraft
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (1-indexed)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
