        arrivalIcao:
          type: string
          example: EDDH
          description: Arrival airport ICAO code
        offBlockTime:
          type: string
          format: time
          example: '14:15:00'
          description: Off-block time (chocks off / engine start) in UTC
        onBlockTime:
          type: string
          format: time
          example: '16:55:00'
          description: On-block time (chocks on / engine shutdown) in UTC
        departureTime:
          type: string
          format: time
          example: '14:30:00'
          description: Takeoff time in UTC
        arrivalTime:
          type: string
          format: time
          example: '16:45:00'
          description: Landing time in UTC
        totalTime:
          type: integer
          minimum: 1
          example: 150
          readOnly: true
          description: Total block time in minutes calculated from offBlockTime and onBlockTime. This field is computed by the server and should not be provided by the client.
