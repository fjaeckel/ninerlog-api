          type: boolean
        launchMethod:
          type: [string, 'null']
          enum: [winch, aerotow, self-launch, 'null']
        picName:
          type: [string, 'null']
          description: Name of the PIC. Auto-set to "Self" when isPic=true, or to instructorName when isDual=true.
        multiPilotTime:
          type: integer
