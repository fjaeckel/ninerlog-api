  # ── Import ────────────────────────────────────────────────────────────

  /imports/upload:
    post:
      tags: [Import]
      summary: Upload file for import
      description: |
        Upload a CSV or XLS/XLSX file containing flight log entries.
        The server parses the file, detects the format (generic CSV, ForeFlight CSV,
        or Excel), and returns the detected columns along with a preview of the
        first rows.  No flights are created at this stage.

        **Supported formats:**
        - Generic CSV (comma, semicolon, or tab delimited)
        - ForeFlight logbook export CSV (auto-detected via header row)
        - XLS (Excel 97-2003)
        - XLSX (Excel 2007+)

        Maximum file size: 10 MB.
      operationId: uploadImportFile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV or XLS/XLSX file to import
            encoding:
              file:
                contentType: text/csv, application/vnd.ms-excel, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        '200':
          description: File parsed successfully — columns and preview rows returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportUploadResponse'
        '400':
          description: File is empty, too large, unsupported format, or cannot be parsed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /imports/preview:
    post:
      tags: [Import]
      summary: Preview mapped flights
      description: |
        Submit column-to-field mappings for a previously uploaded file.
        The server validates every row against flight log rules, detects
        potential duplicates (same date + aircraft + departure + arrival within
        a time tolerance), and returns the validated flights grouped into
        `valid`, `duplicate`, and `error` buckets.  No flights are persisted.
      operationId: previewImport
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportPreviewRequest'
      responses:
        '200':
          description: Validation results with categorised flights
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportPreviewResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Upload token not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /imports/confirm:
    post:
      tags: [Import]
      summary: Confirm and execute import
      description: |
        Confirm a previously previewed import.  The caller specifies which rows
        to import (by row index) and whether to include detected duplicates.
        The server creates flight log entries for the selected rows and returns
        an import summary.
      operationId: confirmImport
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
